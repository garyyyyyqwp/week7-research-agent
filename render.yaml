services:
  - type: web
    name: week7task
    runtime: python
    region: singapore
    buildCommand: |
      apt-get update &&
      apt-get install -y --no-install-recommends fonts-noto-cjk fonts-noto-cjk-extra &&
      pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 120
    healthCheckPath: /health
    envVars:
      # ---- LLM (Qwen3-235B-A22B-Instruct) ----
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://ws-m641g6tn4koc8942.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
      - key: OPENAI_MODEL
        value: qwen3-235b-a22b-instruct-2507
      # ---- Embedding (text-embedding-v3) ----
      - key: OPENAI_EMBEDDING_BASE_URL
        value: https://ws-m641g6tn4koc8942.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
      - key: OPENAI_EMBEDDING_API_KEY
        sync: false
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-v3
      # ---- Search ----
      - key: TAVILY_API_KEY
        sync: false
      # ---- Pipeline params (Week 7 new) ----
      - key: AGENT_MAX_STEPS
        value: "10"
      - key: RETRIEVE_TOP_K
        value: "8"
      - key: MIN_SOURCES
        value: "3"
      - key: PER_SEARCH_TIMEOUT
        value: "15"
      - key: CHUNK_TARGET_TOKENS
        value: "300"
      - key: PYTHONUNBUFFERED
        value: "1"
